name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend/app.js syntax
        run: node --check frontend/app.js

      - name: Check frontend/overrides.js syntax
        run: node --check frontend/overrides.js

      - name: Run Python unittest
        run: python -m unittest discover -s tests -v
